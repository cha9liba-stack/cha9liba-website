// Convert DD/MM/YYYY to YYYY-MM-DD
function toISO(d) {
  if (!d) return "";
  const p = d.trim().split(/[\/\-]/);
  if (p.length === 3) {
    if (p[0].length === 4) return d; // already ISO
    return `${p[2]}-${p[1].padStart(2,"0")}-${p[0].padStart(2,"0")}`;

  return d;

function log(msg, cls="") {
  const el = document.getElementById("log");
  el.innerHTML += `<div class="${cls}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

async function runImport() {
  log("🚀 Démarrage de l'import...", "info");

  for (const v of VEHICLES) {
    const key = norm(v.reg);
    log(`\n📦 Traitement: ${v.reg} (${key})`, "info");

    try {
      // Load existing profile
      const res = await fetch(`${DB}/car_profiles/${key}.json`);
      const existing = await res.json() || {};

      const docs = existing.documents || [];

      // Remove old vidanges, visite_technique, assurance to replace
      const filtered = docs.filter(d =>
        d.type !== "vidange" && d.type !== "visite_technique" && d.type !== "assurance"
      );

      // Add all vidanges (keep history)
      const validVidanges = v.vidanges.filter(vd => vd.km > 0);
      // Sort by km
      validVidanges.sort((a, b) => a.km - b.km);

      for (let i = 0; i < validVidanges.length; i++) {
        const vd = validVidanges[i];
        const isLast = i === validVidanges.length - 1;
        const dateISO = vd.date ? toISO(vd.date) : "";
        filtered.push({
          id: uid(),
          type: "vidange",
          label: isLast ? "Vidange (dernière)" : `Vidange #${i+1}`,
          expiryDate: dateISO,
          kmAtVidange: vd.km,
          nextVidangeKm: vd.km + 10000,
          notes: isLast ? "⬅ Dernière vidange" : "",
        });
        log(`  ✅ Vidange: ${vd.km.toLocaleString()} km → prochaine à ${(vd.km+10000).toLocaleString()} km`, "ok");
      }

      // Add visite technique
      if (v.visiteDate) {
        filtered.push({
          id: uid(),
          type: "visite_technique",
          label: "Visite technique",
          expiryDate: toISO(v.visiteDate),
          notes: "",
        });
        log(`  ✅ Visite technique: ${v.visiteDate}`, "ok");
      }

      // Add assurance
      if (v.assuranceDate) {
        filtered.push({
          id: uid(),
          type: "assurance",
          label: "Assurance",
          expiryDate: toISO(v.assuranceDate),
          notes: "",
        });
        log(`  ✅ Assurance: ${v.assuranceDate}`, "ok");
      }

      // Save to Firebase
      const updated = {
        ...existing,
        registration: key,
        documents: filtered,
      };

      const putRes = await fetch(`${DB}/car_profiles/${key}.json`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(updated),
      });

      if (putRes.ok) {
        log(`  💾 Sauvegardé dans Firebase ✓`, "ok");
      } else {
        log(`  ❌ Erreur Firebase: ${putRes.status}`, "err");
      }

    } catch(e) {
      log(`  ❌ Erreur: ${e.message}`, "err");
    }
  }

  log("\n✅ Import terminé !", "ok");
}
