<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Restore Vehicle Data — Palma</title>
<style>
  body { font-family: sans-serif; padding: 20px; background: #f8fafc; }
  button { padding: 12px 24px; background: #f59e0b; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin: 8px 4px; }
  button.green { background: #16a34a; }
  #log { background: white; border: 1px solid #e2e8f0; border-radius: 8px; padding: 16px; margin-top: 16px; max-height: 600px; overflow-y: auto; font-family: monospace; font-size: 13px; }
  .ok { color: #16a34a; } .err { color: #dc2626; } .info { color: #2563eb; } .warn { color: #d97706; }
  textarea { width: 100%; height: 120px; font-family: monospace; font-size: 12px; border: 1px solid #e2e8f0; border-radius: 8px; padding: 8px; margin-top: 8px; }
</style>
</head>
<body>
<h2>🔧 Restore Vehicle Data — Palma</h2>

<h3>Étape 1 — Vérifier le localStorage</h3>
<p>Ouvrez cette page depuis <strong>localhost:1420</strong> pour accéder au localStorage de l'app.</p>
<button onclick="checkLocalStorage()">🔍 Vérifier localStorage</button>
<div id="ls-result"></div>

<h3>Étape 2 — Restaurer les données financières</h3>
<p>Ce script va restaurer les données financières (photo, finances, km) depuis les données connues.</p>
<button class="green" onclick="restoreFinancialData()">▶ Restaurer les données financières</button>

<div id="log"></div>

<script>
const DB = "https://palmarentacare-default-rtdb.europe-west1.firebasedatabase.app";

function log(msg, cls="") {
  const el = document.getElementById("log");
  el.innerHTML += `<div class="${cls}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

function checkLocalStorage() {
  const data = localStorage.getItem("palma_car_profiles");
  const el = document.getElementById("ls-result");
  if (!data) {
    el.innerHTML = '<p style="color:red">❌ Aucune donnée dans localStorage</p>';
    return;
  }
  const parsed = JSON.parse(data);
  const keys = Object.keys(parsed);
  el.innerHTML = `<p style="color:green">✅ ${keys.length} profils trouvés: ${keys.join(", ")}</p>`;
  
  // Show full data
  const ta = document.createElement("textarea");
  ta.value = JSON.stringify(parsed, null, 2);
  el.appendChild(ta);
}

// Known financial data for each car (from existing Firebase profiles before the bug)
// Format: newKey → financial fields
const FINANCIAL_DATA = {
  "1958TU248": { avance: 16500, category: "SUV", color: "rouge", dateFirstCirculation: "2024-12-14", dateFirstTrait: "2024-12-30", kilometrage: 34138, nombreMoisFix: 42, photo: "/car-images/248TU1958.jpg", priceAchat: 62815.5, priceTrait: 1750, year: 2024 },
  "1959TU248": { avance: 16500, category: "SUV", color: "blanc", dateFirstCirculation: "2024-12-14", dateFirstTrait: "2024-12-30", nombreMoisFix: 42, photo: "/car-images/248TU1959.jpg", priceAchat: 62815.5, priceTrait: 1750, year: 2024 },
  "9192TU234": { photo: "/car-images/234tu9192.jpg" },
  "5605TU236": { photo: "/car-images/236tu5605.jpg" },
  "5606TU236": { photo: "/car-images/236tu5606.jpg" },
  "8305TU238": { photo: "/car-images/238tu8305.jpg" },
  "4485TU240": { photo: "/car-images/240tu4485.png" },
  "4486TU240": { photo: "/car-images/240tu4486.png" },
  "2526TU242": { photo: "/car-images/242tu2526.webp" },
  "2532TU242": { photo: "/car-images/242tu2532.png" },
  "1389TU244": { photo: "/car-images/244tu1389.jpg" },
  "1162TU245": { photo: "/car-images/245tu1162.webp" },
  "7468TU245": { photo: "/car-images/245tu7468.webp" },
  "2504TU246": { photo: "/car-images/246tu2504.jpg" },
  "2508TU246": { photo: "/car-images/246tu2508.jpg" },
  "4912TU246": { photo: "/car-images/246tu4912.png" },
  "201TU248":  { photo: "/car-images/248tu201.jpg" },
  "203TU248":  { photo: "/car-images/248tu203.jpg" },
  "1945TU251": { photo: "/car-images/251tu1945.jpg" },
  "5941TU251": { photo: "/car-images/251tu5941.jpg" },
  "5943TU251": { photo: "/car-images/251tu5943.webp" },
  "7138TU251": { photo: "/car-images/251tu7138.jpg" },
  "7057TU252": { photo: "/car-images/252tu7057.webp" },
  "9601TU252": { photo: "/car-images/252tu9601.jpg" },
  "9603TU252": { photo: "/car-images/252tu9603.jpg" },
  "3541TU253": { photo: "/car-images/253tu3541.jpg" },
  "7378TU254": { photo: "/car-images/254tu7378.png" },
  "7379TU254": { photo: "/car-images/254tu7379.png" },
  "7360TU255": { photo: "/car-images/255tu7360.jpg" },
};

async function restoreFinancialData() {
  log("🚀 Restauration des données financières...", "info");

  for (const [key, financial] of Object.entries(FINANCIAL_DATA)) {
    log(`\n📦 ${key}`, "info");
    try {
      // Read current data (has documents)
      const res = await fetch(`${DB}/car_profiles/${key}.json`);
      const current = await res.json() || {};

      // Merge financial data (don't overwrite documents)
      const merged = {
        registration: key,
        documents: current.documents || [],
        expenses: current.expenses || [],
        ...financial,
        // Keep any existing financial data that's already there
        ...Object.fromEntries(
          Object.entries(current).filter(([k]) => 
            !["registration","documents","expenses"].includes(k) && 
            !(k in financial)
          )
        ),
      };

      const putRes = await fetch(`${DB}/car_profiles/${key}.json`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(merged),
      });

      if (putRes.ok) {
        log(`  ✅ Restauré (${(merged.documents||[]).length} docs, photo: ${!!merged.photo})`, "ok");
      } else {
        log(`  ❌ Erreur: ${putRes.status}`, "err");
      }
    } catch(e) {
      log(`  ❌ ${e.message}`, "err");
    }
  }

  log("\n✅ Restauration terminée ! Rechargez l'application.", "ok");
}
</script>
</body>
</html>
